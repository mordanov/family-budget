version: "3.9"

services:
  # ── Application ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: family_budget_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-budget_user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-family_budget}
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - budget_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Database ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: family_budget_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-budget_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-family_budget}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - budget_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-budget_user} -d ${POSTGRES_DB:-family_budget}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Database migrations ───────────────────────────────────────────────────
  migrate:
    image: python:3.12-slim
    container_name: family_budget_migrate
    restart: "no"
    command: >
      sh -c "pip install asyncpg -q &&
             python /scripts/run_migrations.py"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-budget_user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-family_budget}
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts:/scripts:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - budget_net

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  budget_net:
    driver: bridge
    name: family_budget_network
