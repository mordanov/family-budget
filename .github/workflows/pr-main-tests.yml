name: PR Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: budget_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: family_budget_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://budget_user:test_password@localhost:5432/family_budget_test
      DATABASE_URL: postgresql://budget_user:test_password@localhost:5432/family_budget_test
      LOG_LEVEL: WARNING
      UPLOAD_DIR: /tmp/test_uploads
      LOG_DIR: /tmp/test_logs

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q --tb=short

  status-check:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    name: All Tests Status

    steps:
      - name: All tests passed
        run: |
          echo "✅ All tests passed successfully!"
          echo "🚀 Pull request is ready for review"
